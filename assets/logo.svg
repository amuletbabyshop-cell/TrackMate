<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">

  <!-- Background: rounded square, dark fill, subtle red border -->
  <path
    d="M8,0 H92 Q100,0 100,8 V92 Q100,100 92,100 H8 Q0,100 0,92 V8 Q0,0 8,0 Z"
    fill="#0D0D1F"
    stroke="#E53E3E"
    stroke-width="1.2"
    opacity="0.9"
  />

  <!-- Speed lines (left side, red, decreasing width and opacity) -->
  <!-- Line 1: top, longest, full opacity -->
  <path d="M6,42 H27" stroke="#E53E3E" stroke-width="2.8" stroke-linecap="round" opacity="1"/>
  <!-- Line 2: middle -->
  <path d="M6,50 H22" stroke="#E53E3E" stroke-width="2.2" stroke-linecap="round" opacity="0.7"/>
  <!-- Line 3: bottom, shortest, faintest -->
  <path d="M6,57 H17" stroke="#E53E3E" stroke-width="1.6" stroke-linecap="round" opacity="0.4"/>

  <!-- Track arc (bottom, red) -->
  <path d="M12,84 Q50,96 88,84" fill="none" stroke="#E53E3E" stroke-width="2.2" stroke-linecap="round" opacity="1"/>
  <path d="M16,89 Q50,99 84,89" fill="none" stroke="#E53E3E" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>

  <!-- Sprinter silhouette (white, filled) facing right, full stride -->

  <!-- Head -->
  <circle cx="72" cy="18" r="6.5" fill="#FFFFFF"/>

  <!-- Torso (leaning forward) -->
  <path d="M59,24 Q66,21 74,23 L70,46 Q62,48 54,45 Z" fill="#FFFFFF"/>

  <!-- Back arm (right arm, trailing, swept down-left) -->
  <path d="
    M68,26 Q60,35 52,47
    Q50,49 51,51
    Q52,53 54,52
    Q63,41 71,30
    Z
  " fill="#FFFFFF"/>

  <!-- Front arm (left arm, driving, raised up-right) -->
  <path d="
    M57,28 Q64,17 73,11
    Q75,9 76,11
    Q77,13 75,14
    Q67,21 61,32
    Z
  " fill="#FFFFFF"/>

  <!-- Back leg (right leg, extended behind) -->
  <path d="
    M65,45 Q57,59 47,72
    Q45,75 47,77
    Q49,79 52,77
    Q61,65 70,49
    Z
  " fill="#FFFFFF"/>

  <!-- Front leg upper (thigh raised, going up-right from hip to knee) -->
  <path d="
    M54,43 Q68,51 75,58
    Q77,60 78,62
    Q76,64 74,63
    Q66,57 60,49
    Z
  " fill="#FFFFFF"/>

  <!-- Front leg lower (shin + foot, angling forward-down) -->
  <path d="
    M73,58 Q79,64 84,72
    Q85,74 83,76
    Q81,77 79,75
    Q74,68 68,61
    Z
  " fill="#FFFFFF"/>

</svg>
